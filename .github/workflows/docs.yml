name: docs build

on:
  push:
    branches: [master]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"

defaults:
  run:
    working-directory: docs-site

jobs:
  build:
    name: Build (ES + EN)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site (both locales)
        run: npm run build
        env:
          # Treat broken links and broken markdown links as failures in CI.
          # docusaurus.config.ts is set to "warn" for dev ergonomics.
          NODE_ENV: production

      - name: Upload build artefact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docs-build-${{ github.event.pull_request.number }}
          path: docs-site/build
          retention-days: 7
