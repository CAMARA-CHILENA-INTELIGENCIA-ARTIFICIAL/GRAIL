<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GRAIL — quickstart</title>
<style>
  :root {
    --bg:          #0b0d12;
    --bg-panel:    #131722;
    --bg-elevated: #1b2030;
    --border:      #262c3b;
    --text:        #e7eaf0;
    --text-dim:    #8a93a6;
    --text-faint:  #5a6273;
    --accent:      #7c5cff;
    --accent-dim:  #4a3b9e;
    --danger:      #f87171;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 13px;
    line-height: 1.45;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  #app {
    display: grid;
    grid-template-rows: 44px 1fr 28px;
    grid-template-columns: 1fr 360px;
    height: 100vh;
  }

  /* ── Header ────────────────────────────────────────── */
  header {
    grid-column: 1 / 3;
    display: flex;
    align-items: center;
    padding: 0 16px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  header .logo {
    font-weight: 700;
    letter-spacing: 0.6px;
    color: var(--text);
    font-size: 14px;
  }
  header .logo .grail { color: var(--accent); }
  header .project {
    color: var(--text-dim);
    font-size: 12px;
  }
  header .project::before { content: "·"; margin: 0 8px; color: var(--text-faint); }
  header .run {
    margin-left: auto;
    color: var(--text-faint);
    font-size: 11px;
    font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
  }

  /* ── Graph canvas ──────────────────────────────────── */
  #graph {
    background: radial-gradient(ellipse at center, #15192a 0%, var(--bg) 70%);
    position: relative;
  }
  #graph canvas { display: block; }
  #zoom-controls {
    position: absolute;
    bottom: 16px;
    left: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .zbtn {
    width: 32px; height: 32px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .zbtn:hover { background: var(--bg-elevated); border-color: var(--accent-dim); }

  /* ── Side panel ────────────────────────────────────── */
  aside {
    background: var(--bg-panel);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
  }
  aside::-webkit-scrollbar { width: 8px; }
  aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .section {
    margin-bottom: 18px;
  }
  .section-title {
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text-faint);
    margin: 0 0 8px 0;
    font-weight: 600;
  }

  /* Stats */
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat {
    background: var(--bg-elevated);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .stat .v { font-size: 18px; font-weight: 600; color: var(--text); }
  .stat .k { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  /* Search */
  .search-box {
    position: relative;
  }
  .search-box input {
    width: 100%;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-results {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 10;
    display: none;
  }
  .search-results.open { display: block; }
  .search-results .row {
    padding: 6px 10px;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .search-results .row:hover { background: var(--bg-panel); }
  .search-results .row .dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }
  .search-results .row .type {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
  }

  /* Mode toggle */
  .toggle {
    display: flex;
    background: var(--bg-elevated);
    border-radius: 6px;
    padding: 3px;
    gap: 2px;
  }
  .toggle button {
    flex: 1;
    padding: 6px 8px;
    background: transparent;
    border: 0;
    color: var(--text-dim);
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .toggle button.active { background: var(--accent); color: white; }
  .toggle button:not(.active):hover { color: var(--text); }

  /* Layers (node-kind toggles) */
  .layers { display: flex; flex-direction: column; gap: 4px; }
  .layer {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    user-select: none;
    font-size: 12px;
    transition: opacity 0.15s, background 0.15s;
  }
  .layer:hover { background: var(--bg-panel); }
  .layer.off { opacity: 0.4; }
  .layer .swatch {
    width: 12px; height: 12px; border-radius: 3px;
    flex-shrink: 0;
  }
  .layer.kind-document .swatch { border-radius: 2px; }
  .layer.kind-community .swatch { border-radius: 50%; }
  .layer .name { flex: 1; text-transform: capitalize; }
  .layer .count { color: var(--text-dim); font-size: 11px; font-variant-numeric: tabular-nums; }

  /* Legend */
  .legend { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 8px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 11px;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s, transform 0.1s;
  }
  .chip:hover { transform: translateY(-1px); }
  .chip.hidden { opacity: 0.35; }
  .chip .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .chip .count { color: var(--text-dim); font-size: 10px; }

  /* Detail panel */
  .detail-empty {
    color: var(--text-faint);
    font-size: 12px;
    font-style: italic;
    padding: 16px;
    text-align: center;
    border: 1px dashed var(--border);
    border-radius: 8px;
  }
  .detail-card {
    background: var(--bg-elevated);
    border-radius: 8px;
    padding: 12px;
  }
  .detail-card .name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
    word-break: break-word;
  }
  .detail-card .badges {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 10px;
  }
  .detail-card .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 7px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 500;
    background: var(--bg-panel);
    border: 1px solid var(--border);
  }
  .detail-card .badge .dot { width: 6px; height: 6px; border-radius: 50%; }
  .detail-card .description {
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.55;
    margin-bottom: 10px;
    max-height: 240px;
    overflow-y: auto;
  }
  .detail-card .sources {
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .detail-card .sources .label {
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .detail-card .sources ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .detail-card .sources li {
    font-size: 11px;
    color: var(--text);
    padding: 2px 0;
    word-break: break-word;
  }
  .detail-card .sources li::before { content: "▸ "; color: var(--text-faint); }

  /* ── Footer ────────────────────────────────────────── */
  footer {
    grid-column: 1 / 3;
    display: flex;
    align-items: center;
    padding: 0 16px;
    background: var(--bg-panel);
    border-top: 1px solid var(--border);
    color: var(--text-faint);
    font-size: 11px;
    gap: 12px;
  }
  footer .spacer { flex: 1; }
  footer button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  footer button:hover { color: var(--text); border-color: var(--accent-dim); }
  footer .status { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }

  /* ── Loading state ─────────────────────────────────── */
  #loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 100;
    transition: opacity 0.3s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #loading .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

uced protein synthesis, increased protein catabolism, and altered mitochondrial function.", "_documents": ["SEOM_2023_cachexia.pdf"]}}, {"key": "c5f509b2-8e3f-4189-a7f3-c9c3acc1f4bc", "attributes": {"label": "ANOREXIA", "x": 1516.2616856409936, "y": -4.134411914698974, "size": 14.099453814009577, "color": "#f59e0b", "typeColor": "#e0a070", "communityColor": "#f59e0b", "_kind": "entity", "_type": "SYMPTOM", "_community": "61", "_degree": 8, "_description": "Loss of appetite and reduced caloric intake, frequently driven by inflammatory activation and metabolic changes in CACS. Loss of appetite, a core component of the cancer anorexia-cachexia syndrome. Loss of appetite associated with cancer and its treatment, significantly affecting dietary intake. Loss of appetite and reduced food intake, a core symptom of CACS targeted by various pharmacological and nutritional therapies. A symptom characterized by a reduced desire to eat, commonly associated with cancer-related anorexia-cachexia. Loss of appetite, a common and debilitating symptom in advanced cancer patients. A symptom characterized by a lack of appetite or desire to eat, frequently targeted in cancer cachexia treatments.", "_documents": ["SEOM_2023_cachexia.pdf"]}}, {"key": "ca45c502-11c3-45c4-b8c7-1dc60fe9b30a", "attributes": {"label": "NAUSEA", "x": 1503.117872101767, "y": -10.854274509163831, "size": 10.002975659650835, "color": "#f59e0b", "typeColor": "#e0a070", "communityColor": "#f59e0b", "_kind": "entity", "_type": "SYMPTOM", "_community": "61", "_degree": 3, "_description": "A gastrointestinal symptom experienced by CACS patients that complicates oral nutritional intake and adherence. A side effect of radiotherapy/chemotherapy that lowers caloric input. A digestive symptom linked to cancer and treatment that negatively impacts nutrition and food consumption.", "_documents": ["SEOM_2023_cachexia.pdf"]}}, {"key": "984cdfed-cd46-452e-a148-4c84e8ecc73b", "attributes": {"label": "VOMITING", "x": 1503.1025612844503, "y": -10.83539667323863, "size": 10.002975659650835, "color": "#f59e0b", "typeColor": "#e0a070", "communityColor": "#f59e0b", "_kind": "entity", "_type": "SYMPTOM", "_community": "61", "_degree": 3, "_description": "A gastrointestinal symptom associated with CACS that further impedes nutritional management and quality of life. A side effect of cancer treatments that exacerbates nutrient loss.", "_documents": ["SEOM_2023_cachexia.pdf"]}}, {"key": "b1573747-c521-4a22-9094-a99ffef9bcb5", "attributes": {"label": "DIETARY COUNSELING", "x": 1509.5246745293882, "y": 0.683470525139548, "size": 6.501487829825417, "color": "#f59e0b", "typeColor": "#7ac49a", "communityColor": "#f59e0b", "_kind": "entity", "_type": "TREATMENT", "_community": "61", "_degree": 1, "_description": "A foundational nutritional intervention recommended to tailor caloric and protein intake to individual patient needs.", "_documents": ["SEOM_2023_cachexia.pdf"]}}, {"key": "79b5625f-5616-4c60-9d30-c37696daed05", "attributes": {"label": "ORAL NUTRITIONAL SUPPLEMENTS", "x": 1501.982241093437, "y": 3.5965269182109902, "size": 8.54972690700479, "color": "#f59e0b", "typeColor": "#7ac49a", "communityColor": "#f59e0b", "_kind": "entity", "_type": "TREATMENT", "_community": "61", "_degree": 2, "_description": "A nutritional support strategy used to address increased metabolic demands and nutrient deficiencies in CACS. Standard nutritional supplements provided to patients, often evaluated for efficacy in maintaining nutritional status when used with or without dietary counseling. Supplied as part of directed care to improve energy intake and induce weight gain.", "_documents": ["SEOM_2023_cachexia.pdf"]}}, {"key": "5fd6c9a9-bb84-40ab-bb19-6bb4c153f60c", "attributes": {"label": "ENTERAL NUTRITION", "x": 1509.0132020241895, "y": -4.827192005463657, "size": 11.130202965977816, "color": "#f59e0b", "typeColor": "#7ac49a", "communityColor": "#f59e0b", "_kind": "entity", "_type": "TREATMENT", "_community": "61", "_degree": 4, "_description": "A clinical nutritional intervention employed when oral intake is insufficient to meet patient requirements. Nutritional support method administered via the gastrointestinal tract, individualized based on GI functioning and cancer stage. A method of delivering nutrients directly to the gastrointestinal tract, preferred over parenteral nutrition when bowel function is preserved. Recommended to maintain nutritional status if oral feeding is insufficient. A method of delivering nutrients directly into the gastrointestinal tract, frequently compared with parenteral nutrition in cancer care.", "_documents": ["SEOM_2023_cachexia.pdf"]}}, {"key": "3d19de14-0d73-4441-84a4-3687ea7230d7", "attributes": {"label": "PARENTERAL NUTRITION", "x": 1505.368886989421, "y": -4.600704847972301, "size": 11.130202965977816, "color": "#f59e0b", "typeColor": "#7ac49a", "communityColor": "#f59e0b", "_kind": "entity", "_type": "TREATMENT", "_community": "61", "_degree": 4, "_description": "A supportive nutritional treatment used judiciously in severe or refractory CACS cases when other methods fail. Intravenous nutritional support used as an alternative when enteral or oral routes are insufficient or contraindicated. Intravenous nutritional support used when oral or enteral intake is insufficient, considered for patients with a prognosis exceeding two months and adequate functional status. May be used in oncologic patients with severely compromised survival due to malnutrition. A method of feeding that bypasses the gastrointestinal tract, used in cancer patients when enteral routes are not feasible.", "_documents": ["SEOM_2023_cachexia.pdf"]}}, {"key": "ce0507d4-530b-467e-9eed-eef9dffb1428", "attributes": {"label": "MEGESTROL ACETATE", "x": 1507.2655674152127, "y": 1.3008849660774564, "size": 13.504463489476253, "color": "#f59e0b", "typeColor": "#7abfc4", "communityColor": "#f59e0b", "_kind": "entity", "_type": "DRUG", "_community": "61", "_degree": 7, "_descripti 6954566391094494e-14, "size": 22.0, "color": "#f59e0b", "typeColor": "#f59e0b", "communityColor": "#f59e0b", "_kind": "community", "_community_id": "61", "_level": 1, "_size": 448, "_rank": 8.5, "_title": "SEOM Clinical Guidelines for Cancer Anorexia-Cachexia Syndrome", "_summary": "This community centers on the 2023 SEOM clinical guidelines for managing Cancer Anorexia-Cachexia Syndrome (CACS), developed by a multidisciplinary team of oncologists and researchers. The network synthesizes the pathophysiology of CACS, evidence-based nutritional and pharmacological interventions, and validated screening tools for diverse oncology populations.", "_n_findings": 4}}, {"key": "comm:62", "attributes": {"label": "Community 62 (level 1)", "x": -1213.5254915624212, "y": 881.6778784387099, "size": 15.84, "color": "#8b5cf6", "typeColor": "#8b5cf6", "communityColor": "#8b5cf6", "_kind": "community", "_community_id": "62", "_level": 1, "_size": 23, "_rank": 0.0, "_title": "Community 62 (level 1)", "_summary": "", "_n_findings": 0}}, {"key": "comm:63", "attributes": {"label": "Community 63 (level 1)", "x": 463.52549156242077, "y": -1426.5847744427308, "size": 14.24, "color": "#06b6d4", "typeColor": "#06b6d4", "communityColor": "#06b6d4", "_kind": "community", "_community_id": "63", "_level": 1, "_size": 3, "_rank": 0.0, "_title": "Community 63 (level 1)", "_summary": "", "_n_findings": 0}}, {"key": "find:61:0", "attributes": {"label": "Multidisciplinary oncology experts authored the 2023 SEOM cl…", "x": 1636.0679881245915, "y": -3.6954566391094494e-14, "size": 4.0, "color": "#f59e0b", "typeColor": "#94a3b8", "communityColor": "#f59e0b", "_kind": "finding", "_summary": "Multidisciplinary oncology experts authored the 2023 SEOM clinical guidelines for CACS.", "_explanation": "A core group of lead and co-author oncologists collaborated to synthesize current evidence and establish consensus recommendations for managing cancer-related anorexia-cachexia syndrome. [Data: Entities (0, 1, 2, 3, 27); Relationships ()]", "_community_id": "61"}}, {"key": "find:61:1", "attributes": {"label": "CACS pathophysiology is driven by systemic inflammation and …", "x": 1500.0, "y": 136.06798812459155, "size": 4.0, "color": "#f59e0b", "typeColor": "#94a3b8", "communityColor": "#f59e0b", "_kind": "finding", "_summary": "CACS pathophysiology is driven by systemic inflammation and metabolic dysregulation.", "_explanation": "The syndrome involves progressive weight loss and muscle wasting fueled by pro-inflammatory cytokines like IL-6 and TNF-α, which alter hormone production and accelerate protein catabolism. [Data: Entities (13, 17, 18, 45, 67); Relationships ()]", "_community_id": "61"}}, {"key": "find:61:2", "attributes": {"label": "Management follows a stepped protocol prioritizing nutrition…", "x": 1363.9320118754085, "y": -2.0291043778774378e-14, "size": 4.0, "color": "#f59e0b", "typeColor": "#94a3b8", "communityColor": "#f59e0b", "_kind": "finding", "_summary": "Management follows a stepped protocol prioritizing nutritional support and targeted pharmacotherapy.", "_explanation": "Clinical recommendations advocate for dietary counseling and oral supplements as first-line interventions, escalating to enteral or parenteral nutrition when necessary, while utilizing agents like megestrol acetate and glucocorticoids to stimulate appetite. [Data: Entities (22, 23, 24, 25, 26); Relationships ()]", "_community_id": "61"}}, {"key": "find:61:3", "attributes": {"label": "Validated screening tools are essential for early detection …", "x": 1500.0, "y": -136.0679881245916, "size": 4.0, "color": "#f59e0b", "typeColor": "#94a3b8", "communityColor": "#f59e0b", "_kind": "finding", "_summary": "Validated screening tools are essential for early detection and risk stratification.", "_explanation": "The guidelines emphasize using specialized instruments like NRS-2002, PG-SGA, and NUTRISCORE to systematically assess nutritional risk across hospitalized, outpatient, and chemotherapy-treated cancer populations. [Data: Entities (102, 105, 106, 196, 197); Relationships ()]", "_community_id": "61"}}, {"key": "find:23:0", "attributes": {"label": "Molecular biomarkers like IDH mutations and 1p19q co-deletio…", "x": 460.87036731456465, "y": 13.736161106139889, "size": 4.0, "color": "#6366f1", "typeColor": "#94a3b8", "communityColor": "#6366f1", "_kind": "finding", "_summary": "Molecular biomarkers like IDH mutations and 1p19q co-deletion are essential for diagnosing and prognosticating low-grade gliomas.", "_explanation": "These genetic alterations differentiate astrocytomas from oligodendrogliomas and strongly correlate with favorable survival outcomes, directly influencing MRI surveillance intervals and treatment selection. [Data: Entities (267, 281); Relationships (263, 269)]", "_community_id": "23"}}, {"key": "find:23:1", "attributes": {"label": "Clinical management utilizes risk scores to guide surgical r…", "x": 324.80237918997307, "y": 149.80414923073147, "size": 4.0, "color": "#6366f1", "typeColor": "#94a3b8", "communityColor": "#6366f1", "_kind": "finding", "_summary": "Clinical management utilizes risk scores to guide surgical resection and adjuvant therapies based on patient characteristics.", "_explanation": "Maximal safe resection remains the foundational intervention, while high-risk features like age over 40 or subtotal resection trigger more aggressive multimodal approaches. [Data: Entities (277, 295); Relationships (260, 277)]", "_community_id": "23"}}, {"key": "find:23:2", "attributes": {"label": "Vorasidenib represents a major therapeutic advancement as a …", "x": 188.7343910653815, "y": 13.736161106139905, "size": 4.0, "color": "#6366f1", "typeColor": "#94a3b8", "communityColor": "#6366f1", "_kind": "finding", "_summary": "Vorasidenib represents a major therapeutic advancement as a targeted IDH inhibitor for recurrent or residual disease.", "_explanation": "The INDIGO trial and ongoing FDA/EMA reviews highlight a significant shift toward molecularly targeted treatments, moving beyond traditional chemotherapy and radiotherapy for specific patient subsets. [Data: Entities (278, 328); Relationships (261, 305)]", "_community_id": "23"}}, {"key": "find:23:3", "attributes": {"label": "The patient population primarily consists of working-aged ad…", "x": 324.80237918997307, "y": -122.33182701845169, "size": 4.0, "color": "#6366f1", "typeColor": "#94a3b8", "communityColor": "#6366f1", "_kind": "finding", "_summary": "The patient population primarily consists of working-aged adults who face long-term neurological and quality-of-life challenges.", "_explanation": "Long-term survival often comes with functional challenges like cognitive dysfunction and fatigue, necessitating prolonged surveillance and multidisciplinary supportive care to maintain quality of life. [Data: Entities (276, 349); Relationships (259, 330)]", "_community_id": "23"}}], "edges": [{"key": "c5dddcd5-15e7-479d-9480-0dd83dc7a4be", "source": "d460152b-09e5-418e-a624-d8c7334c674f", "target": "5b7cc815-3bb4-45e4-9612-62566f9aec17", "attributes": {"size": 3.5, "color": "#5b6478", "_kind": "RELATED", "label": "SEOM is the organizing body that developed, reviewed, and published the clinica…", "_description": "SEOM is the organizing body that developed, reviewed, and published the clinical guidelines.", "_weight": 10.0, "_rank": 15.0}}, {"key": "107a0e3a-c294-4fca-843c-2af6a53c7467", "source": "2a4f5e19-b7e9-4e10-bdd4-1037f995e3fe", "target": "5b7cc815-3bb4-45e4-9612-62566f9aec17", "attributes": {"size": 3.5, "color": "#5b6478", "_kind": "RELATED", "label": "The guidelines provide comprehensive, evidence-based recommendations for the di…", "_description": "The guidelines provide comprehensive, evidence-based recommendations for the diagnosis and management of this syndrome.", "_weight": 10.0, "_rank": 29.0}}, {"key": "f34af0ed-9dc8-4f36-8d3f-af245fa3d58c", "source": "2a4f5e19-b7e9-4e10-bdd4-1037f995e3fe", "target": "db9227c5-f93a-4ed2-8a2b-8a // ─────────────────────────────────────────────────────────────────────
//   Build the Graphology graph
// ─────────────────────────────────────────────────────────────────────
const graph = new graphology.Graph({type: "undirected", multi: false});
GRAPH_DATA.nodes.forEach(n => graph.addNode(n.key, n.attributes));
GRAPH_DATA.edges.forEach(e => {
  if (graph.hasNode(e.source) && graph.hasNode(e.target) && !graph.hasEdge(e.source, e.target)) {
    graph.addEdge(e.source, e.target, e.attributes);
  }
});

// ─────────────────────────────────────────────────────────────────────
//   Renderer
// ─────────────────────────────────────────────────────────────────────
const container = document.getElementById("graph");
const renderer = new Sigma(graph, container, {
  renderEdgeLabels: false,
  labelColor:        {color: "#d4dae8"},
  labelSize:         11,
  labelWeight:       "500",
  labelFont:         "-apple-system, BlinkMacSystemFont, sans-serif",
  // Only label nodes with rendered size >= this threshold — keeps the canvas
  // legible. Smaller nodes still reveal their label on hover.
  labelRenderedSizeThreshold: 9,
  labelDensity:      1.0,
  labelGridCellSize: 70,
  defaultEdgeColor:  "#5b6478",
  edgeColor:         "default",
  zIndex:            true,
  allowInvalidContainer: true,
  // Don't render edges thinner than this — keeps faint relationships visible.
  minEdgeThickness:  0.8,
});

// ─────────────────────────────────────────────────────────────────────
//   State + reducers (hover highlight, hidden types, color mode)
// ─────────────────────────────────────────────────────────────────────
// Initialize per-kind visibility from the meta payload's recommended defaults.
const defaultVisibleKinds = new Set(GRAPH_DATA.meta.default_visible_kinds || ["entity"]);
const allKinds = Object.keys(GRAPH_DATA.meta.kind_palette || {});
const hiddenKinds = new Set(allKinds.filter(k => !defaultVisibleKinds.has(k)));

const state = {
  hovered:        null,           // node key
  hoveredNeighbors: new Set(),
  selected:       null,           // node key
  hiddenTypes:    new Set(),      // entity-type filter
  hiddenKinds:    hiddenKinds,    // node-kind filter (document/chunk/entity/community/finding)
  searchMatches:  null,           // Set or null (null = no active search)
  // Communities are the primary visual grouping — default the color mode
  // accordingly. Toggle in the sidebar to switch to entity-type coloring.
  colorMode:      "community",    // 'community' | 'type'
};

renderer.setSetting("nodeReducer", (node, data) => {
  const res = {...data};
  // Kind visibility — quickest reject; hides everything else for this node.
  if (state.hiddenKinds.has(data._kind)) {
    res.hidden = true;
    return res;
  }
  // Color mode applies only to entities; other kinds keep their kind-color.
  if (data._kind === "entity") {
    res.color = (state.colorMode === "community") ? data.communityColor : data.typeColor;
    res.zIndex = 1;  // entities always render above background kinds
  } else if (data._kind === "community") {
    // Communities sit behind entities and stay semi-transparent so they read
    // as landmarks, not as the primary nodes.
    res.color = (data.communityColor || data.color) + "aa";
    res.zIndex = 0;
  } else if (data._kind === "document") {
    res.zIndex = 0;
  } else if (data._kind === "chunk" || data._kind === "finding") {
    res.zIndex = 0;
  }
  // Entity-type filter (only affects entities).
  if (data._kind === "entity" && state.hiddenTypes.has(data._type)) {
    res.hidden = true;
    return res;
  }
  // Search filter
  if (state.searchMatches && !state.searchMatches.has(node)) {
    res.label = "";
    res.color = "#2a2f3a";
    res.size  = Math.max(2, data.size * 0.5);
    return res;
  }
  // Hover highlight
  if (state.hovered) {
    if (node === state.hovered) {
      res.zIndex = 2;
      res.highlighted = true;
    } else if (state.hoveredNeighbors.has(node)) {
      res.zIndex = 1;
    } else {
      res.label = "";
      res.color = res.color + "33"; // append alpha → translucent
    }
  }
  // Selected
  if (node === state.selected) {
    res.zIndex = 3;
    res.highlighted = true;
  }
  return res;
});

renderer.setSetting("edgeReducer", (edge, data) => {
  const res = {...data};
  const [src, tgt] = graph.extremities(edge);
  const srcKind = graph.getNodeAttribute(src, "_kind");
  const tgtKind = graph.getNodeAttribute(tgt, "_kind");
  // Hide if either endpoint's kind is currently hidden.
  if (state.hiddenKinds.has(srcKind) || state.hiddenKinds.has(tgtKind)) {
    res.hidden = true;
    return res;
  }
  // MENTIONS is a synthetic doc↔entity shortcut — only useful when chunks are
  // hidden. When the user turns chunks on, hide MENTIONS so we don't duplicate
  // the Doc→Chunk→Entity path.
  if (data._kind === "MENTIONS" && !state.hiddenKinds.has("chunk")) {
    res.hidden = true;
    return res;
  }
  // Entity-type filter (only relevant for RELATED edges between entities).
  if (srcKind === "entity" && tgtKind === "entity" &&
      (state.hiddenTypes.has(graph.getNodeAttribute(src, "_type")) ||
       state.hiddenTypes.has(graph.getNodeAttribute(tgt, "_type")))) {
    res.hidden = true;
    return res;
  }
  // Hover: only show edges incident to the hovered node, in accent color.
  if (state.hovered) {
    if (src === state.hovered || tgt === state.hovered) {
      res.color = "#a78bfa";
      res.size  = Math.max(data.size + 0.5, 2.0);
      res.zIndex = 1;
    } else {
      res.hidden = true;
    }
  } else if (data._kind === "RELATED" && state.colorMode === "community") {
    // Intra-community RELATED edges glow softly in the cluster color.
    const srcComm = graph.getNodeAttribute(src, "_community");
    const tgtComm = graph.getNodeAttribute(tgt, "_community");
    if (srcComm && srcComm === tgtComm) {
      const palette = GRAPH_DATA.meta.community_palette;
      res.color = (palette[srcComm] || "#5b6478") + "55";
    }
  }
  return res;
});

// ─────────────────────────────────────────────────────────────────────
//   Events
// ─────────────────────────────────────────────────────────────────────
renderer.on("enterNode", ({node}) => {
  state.hovered = node;
  state.hoveredNeighbors = new Set(graph.neighbors(node));
  document.getElementById("hover-status").textContent = node;
  container.style.cursor = "pointer";
  renderer.refresh();
});

renderer.on("leaveNode", () => {
  state.hovered = null;
  state.hoveredNeighbors = new Set();
  document.getElementById("hover-status").textContent = "";
  container.style.cursor = "default";
  renderer.refresh();
});

renderer.on("clickNode", ({node}) => {
  state.selected = node;
  showDetail(node);
  renderer.refresh();
});

renderer.on("clickStage", () => {
  state.selected = null;
  showDetail(null);
  renderer.refresh();
});

// ─────────────────────────────────────────────────────────────────────
//   UI: stats
// ─────────────────────────────────────────────────────────────────────
function renderStats() {
  const m = GRAPH_DATA.meta;
  const cells = [
    {k: "Entities",      v: m.n_entities},
    {k: "Relationships", v: m.n_relationships},
    {k: "Communities",   v: m.n_communities},
    {k: "Documents",     v: m.n_documents},
  ];
  document.getElementById("stats").innerHTML = cells.map(
    c => `<div class="stat"><div class="v">${c.v}</div><div class="k">${c.k}</div></div>`
  ).join("");
}

// ─────────────────────────────────────────────────────────────────────
//   UI: layers (per-kind visibility)
// ─────────────────────────────────────────────────────────────────────
const KIND_ORDER = ["document", "chunk", "entity", "community", "finding"];

function renderLayers() {
  const counts  = GRAPH_DATA.meta.kind_counts  || {};
  const palette = GRAPH_DATA.meta.kind_palette || {};
  const html = KIND_ORDER
    .filter(k => (counts[k] || 0) > 0)
    .map(k => {
      const isOff = state.hiddenKinds.has(k);
      return `
      <div class="layer kind-${k} ${isOff ? 'off' : ''}" data-kind="${k}">
        <span class="swatch" style="background:${palette[k]}"></span>
        <span class="name">${k}s</span>
        <span class="count">${counts[k]}</span>
      </div>`;
    })
    .join("");
  document.getElementById("layers").innerHTML = html;
  document.querySelectorAll(".layer").forEach(row => {
    row.addEventListener("click", () => {
      const k = row.dataset.kind;
      if (state.hiddenKinds.has(k)) {
        state.hiddenKinds.delete(k);
        row.classList.remove("off");
      } else {
        state.hiddenKinds.add(k);
        row.classList.add("off");
      }
      renderer.refresh();
    });
  });
}

// ─────────────────────────────────────────────────────────────────────
//   UI: legend
// ─────────────────────────────────────────────────────────────────────
function renderLegend() {
  const palette = GRAPH_DATA.meta.type_palette;
  const counts  = GRAPH_DATA.meta.type_counts;
  const entries = Object.entries(palette).sort((a, b) => (counts[b[0]] || 0) - (counts[a[0]] || 0));
  const html = entries.map(([t, color]) => `
    <span class="chip" data-type="${t}" title="Click to toggle">
      <span class="dot" style="background:${color}"></span>
      <span>${t}</span>
      <span class="count">${counts[t] || 0}</span>
    </span>
  `).join("");
  document.getElementById("legend").innerHTML = html;
  document.querySelectorAll(".chip").forEach(chip => {
    chip.addEventListener("click", () => {
      const t = chip.dataset.type;
      if (state.hiddenTypes.has(t)) {
        state.hiddenTypes.delete(t);
        chip.classList.remove("hidden");
      } else {
        state.hiddenTypes.add(t);
        chip.classList.add("hidden");
      }
      renderer.refresh();
    });
  });
}

// ─────────────────────────────────────────────────────────────────────
//   UI: search
// ─────────────────────────────────────────────────────────────────────
const searchInput = document.getElementById("search");
const searchResults = document.getElementById("search-results");

searchInput.addEventListener("input", () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) {
    state.searchMatches = null;
    searchResults.classList.remove("open");
    renderer.refresh();
    return;
  }
  const palette = GRAPH_DATA.meta.type_palette;
  const matches = [];
  graph.forEachNode((node, attrs) => {
    if (attrs.label.toLowerCase().includes(q)) {
      matches.push({node, label: attrs.label, type: attrs._type, color: palette[attrs._type] || "#888"});
    }
  });
  state.searchMatches = new Set(matches.map(m => m.node));

  searchResults.innerHTML = matches.slice(0, 25).map(m => `
    <div class="row" data-node="${m.node}">
      <span class="dot" style="background:${m.color}"></span>
      <span>${m.label}</span>
      <span class="type">${m.type}</span>
    </div>
  `).join("") || `<div class="row" style="color:var(--text-faint)">No matches</div>`;
  searchResults.classList.add("open");
  renderer.refresh();
});

searchResults.addEventListener("click", (e) => {
  const row = e.target.closest(".row");
  if (!row || !row.dataset.node) return;
  const node = row.dataset.node;
  state.selected = node;
  searchResults.classList.remove("open");
  searchInput.value = graph.getNodeAttribute(node, "label");
  state.searchMatches = null;
  centerOnNode(node);
  showDetail(node);
  renderer.refresh();
});

document.addEventListener("click", (e) => {
  if (!e.target.closest(".search-box")) {
    searchResults.classList.remove("open");
  }
});

// ─────────────────────────────────────────────────────────────────────
//   UI: color mode toggle
// ─────────────────────────────────────────────────────────────────────
document.querySelectorAll("#color-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("#color-toggle button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    state.colorMode = btn.dataset.mode;
    renderer.refresh();
  });
});

// ─────────────────────────────────────────────────────────────────────
//   UI: entity detail
// ─────────────────────────────────────────────────────────────────────
function showDetail(node) {
  const elt = document.getElementById("detail");
  if (!node) {
    elt.innerHTML = `<div class="detail-empty">Click a node for details</div>`;
    return;
  }
  const a = graph.getNodeAttributes(node);
  const kindPalette = GRAPH_DATA.meta.kind_palette || {};
  const kindColor = a.color || kindPalette[a._kind] || "#888";

  let bodyHtml = "";
  if (a._kind === "entity") {
    const palette = GRAPH_DATA.meta.type_palette;
    const commPalette = GRAPH_DATA.meta.community_palette;
    const typeColor = palette[a._type] || "#888";
    const commColor = commPalette[a._community] || "#888";
    const docs = (a._documents || []).map(d => `<li>${escapeHtml(d)}</li>`).join("");
    bodyHtml = `
      <div class="badges">
        <span class="badge"><span class="dot" style="background:${typeColor}"></span>${a._type}</span>
        ${a._community ? `<span class="badge"><span class="dot" style="background:${commColor}"></span>Community ${a._community}</span>` : ""}
        <span class="badge">Degree ${a._degree}</span>
      </div>
      <div class="description">${escapeHtml(a._description || "—")}</div>
      ${docs ? `<div class="sources"><div class="label">Sources</div><ul>${docs}</ul></div>` : ""}
    `;
  } else if (a._kind === "document") {
    bodyHtml = `
      <div class="badges">
        <span class="badge"><span class="dot" style="background:${kindColor}"></span>Document</span>
        <span class="badge">${a._n_text_units} chunks</span>
      </div>
      <div class="description">${escapeHtml(a._path || "—")}</div>
    `;
  } else if (a._kind === "chunk") {
    bodyHtml = `
      <div class="badges">
        <span class="badge"><span class="dot" style="background:${kindColor}"></span>Chunk</span>
        <span class="badge">${a._n_tokens} tokens</span>
      </div>
      <div class="description">${escapeHtml(a._text || "—")}</div>
    `;
  } else if (a._kind === "community") {
    bodyHtml = `
      <div class="badges">
        <span class="badge"><span class="dot" style="background:${kindColor}"></span>Community ${a._community_id}</span>
        <span class="badge">${a._size} entities</span>
        ${a._rank > 0 ? `<span class="badge">Rank ${a._rank.toFixed(1)}</span>` : ""}
        ${a._n_findings ? `<span class="badge">${a._n_findings} findings</span>` : ""}
      </div>
      <div class="description">${escapeHtml(a._summary || "—")}</div>
    `;
  } else if (a._kind === "finding") {
    bodyHtml = `
      <div class="badges">
        <span class="badge"><span class="dot" style="background:${kindColor}"></span>Finding</span>
        <span class="badge">Community ${a._community_id}</span>
      </div>
      <div class="description"><strong>${escapeHtml(a._summary)}</strong><br><br>${escapeHtml(a._explanation)}</div>
    `;
  }

  elt.innerHTML = `
    <div class="detail-card">
      <div class="name">${escapeHtml(a.label)}</div>
      ${bodyHtml}
    </div>
  `;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

// ─────────────────────────────────────────────────────────────────────
//   Camera controls
// ─────────────────────────────────────────────────────────────────────
function centerOnNode(node) {
  const {x, y} = graph.getNodeAttributes(node);
  renderer.getCamera().animate({x, y, ratio: 0.4}, {duration: 600});
}

document.getElementById("zoom-in").addEventListener("click", () => {
  renderer.getCamera().animatedZoom({factor: 1.5});
});
document.getElementById("zoom-out").addEventListener("click", () => {
  renderer.getCamera().animatedUnzoom({factor: 1.5});
});
document.getElementById("zoom-reset").addEventListener("click", () => {
  renderer.getCamera().animatedReset();
});

// ─────────────────────────────────────────────────────────────────────
//   Re-layout (ForceAtlas2 in the browser)
// ─────────────────────────────────────────────────────────────────────
document.getElementById("relayout").addEventListener("click", () => {
  if (!window.graphologyLibrary || !window.graphologyLibrary.layoutForceAtlas2) {
    if (typeof forceAtlas2 === "undefined") {
      alert("ForceAtlas2 layout library failed to load (CDN unreachable).");
      return;
    }
  }
  const fa2 = (window.graphologyLibrary && window.graphologyLibrary.layoutForceAtlas2) || window.forceAtlas2;
  const settings = fa2.inferSettings(graph);
  settings.gravity = 1;
  settings.scalingRatio = 10;
  document.getElementById("loading").classList.remove("hidden");
  setTimeout(() => {
    fa2.assign(graph, {iterations: 150, settings});
    renderer.refresh();
    renderer.getCamera().animatedReset();
    document.getElementById("loading").classList.add("hidden");
  }, 20);
});

// ─────────────────────────────────────────────────────────────────────
//   Boot
// ─────────────────────────────────────────────────────────────────────
renderStats();
renderLayers();
renderLegend();

// ForceAtlas2 produces the natural "social-graph" look — clusters emerge from
// edge density rather than being arranged on a ring. We seed it with the
// community-aware spring positions so the final layout still respects the
// community structure but flows organically. Cheap for the quickstart (~382
// nodes) — a few hundred ms.
function runForceAtlas2(iterations) {
  const lib = window.graphologyLibrary && window.graphologyLibrary.layoutForceAtlas2;
  const fa2 = lib || window.forceAtlas2;
  if (!fa2) return;
  try {
    const settings = fa2.inferSettings(graph);
    settings.gravity         = 1.5;
    settings.scalingRatio    = 12;
    settings.slowDown        = 8;
    settings.barnesHutOptimize = graph.order > 1000;
    settings.outboundAttractionDistribution = true;
    fa2.assign(graph, {iterations: iterations || 200, settings});
  } catch (e) { console.warn("ForceAtlas2 failed:", e); }
}

// One pass of noverlap nudges any remaining overlapping nodes apart so labels
// don't collide.
function runNoverlap() {
  const lib = window.graphologyLibrary && window.graphologyLibrary.layoutNoverlap;
  const fn  = lib || window.noverlap;
  if (!fn) return;
  try {
    fn.assign(graph, {
      maxIterations: 60,
      settings: {margin: 4, ratio: 1.1, expansion: 1.1, gridSize: 30, speed: 3},
    });
  } catch (e) { console.warn("Noverlap failed:", e); }
}

window.addEventListener("load", () => {
  // Use the next animation frame so the spinner has a chance to render.
  requestAnimationFrame(() => {
    runForceAtlas2(200);
    runNoverlap();
    renderer.refresh();
    renderer.getCamera().animatedReset();
    document.getElementById("loading").classList.add("hidden");
  });
});
</script>
