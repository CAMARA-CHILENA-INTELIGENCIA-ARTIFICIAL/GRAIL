# Vector store — where entity-description embeddings live for local search.

# Supported backends: "lancedb" (default), "faiss", "chromadb".
# faiss requires:    pip install grail[faiss]
# chromadb requires: pip install grail[chroma]
backend: lancedb

# Collection / table name.
collection_name: entity_descriptions

# When null, the store lives at {root_dir}/{backend}. Override for shared
# mounts or to keep multiple projects in one DB.
uri: null

# Distance function for ChromaDB ("l2" or "cosine"). Ignored by other backends.
distance_fn: l2
