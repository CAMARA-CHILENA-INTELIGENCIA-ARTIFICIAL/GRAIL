# Vector store — where entity-description embeddings live for local search.

# Supported backends: "faiss" (default), "lancedb", "chromadb".
# faiss:    in-memory, cosine similarity via IndexFlatIP, persisted to disk.
#           Zero external services, works out of the box.
# lancedb:  on-disk, cosine similarity. Good for larger indexes.
# chromadb: requires pip install grail[chroma]
backend: faiss

# Collection / table name.
collection_name: entity_descriptions

# When null, the store lives at {root_dir}/{backend}. Override for shared
# mounts or to keep multiple projects in one DB.
uri: null

# Distance function hint. FAISS and LanceDB always use cosine.
# ChromaDB supports "l2" or "cosine".
distance_fn: cosine
